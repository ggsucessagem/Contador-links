<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links Rastreáveis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 10px; color: #00ff88; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
        .form-card, .links-section {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #0a0a0a;
            color: white;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #00ff88; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ff88, #00cc6e);
            color: #0a0a0a;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .link-item {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .link-info { flex: 1; }
        .link-name { font-weight: 600; margin-bottom: 5px; }
        .link-url { font-size: 11px; color: #888; word-break: break-all; }
        .link-clicks { color: #00ff88; font-weight: 700; font-size: 18px; }
        .btn-edit {
            background: #ffc107;
            color: #0a0a0a;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 5px;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .empty-state { text-align: center; color: #666; padding: 30px; }
        .total-clicks { color: #00ff88; font-weight: 600; margin-bottom: 15px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #00ff88;
        }
        .modal-content h3 { color: #00ff88; margin-bottom: 20px; }
        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Meus Links Rastreáveis</h1>
        <p class="subtitle">Crie links e veja quantas pessoas clicaram</p>

        <div class="form-card">
            <div class="form-group">
                <label>📝 Nome do link</label>
                <input type="text" id="linkName" placeholder="Ex: Promoção Instagram">
            </div>
            <div class="form-group">
                <label>🔗 URL de destino</label>
                <input type="text" id="linkUrl" placeholder="https://exemplo.com">
            </div>
            <div class="form-group">
                <label>🏷️ Slug (identificador)</label>
                <input type="text" id="linkSlug" placeholder="Ex: promocao-instagram">
            </div>
            <button onclick="createLink()">✨ Criar Link</button>
            <div id="result" style="margin-top: 15px; color: #00ff88; font-size: 14px;"></div>
        </div>

        <div class="links-section">
            <div class="total-clicks" id="totalClicks">Total: 0 cliques</div>
            <div id="linksList"></div>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h3>✏️ Editar Link</h3>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>📝 Nome do link</label>
                <input type="text" id="editName">
            </div>
            <div class="form-group">
                <label>🔗 URL de destino</label>
                <input type="text" id="editUrl">
            </div>
            <button onclick="saveEdit()">💾 Salvar</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'meus_links_rastreaveis';
        let editId = null;

        function loadLinks() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function saveLinks(links) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
        }

        function createLink() {
            const name = document.getElementById('linkName').value.trim();
            const url = document.getElementById('linkUrl').value.trim();
            const slug = document.getElementById('linkSlug').value.trim().toLowerCase().replace(/\s+/g, '-');

            if (!name || !url || !slug) {
                alert('Preencha todos os campos!');
                return;
            }

            const links = loadLinks();
            if (links.some(l => l.slug === slug)) {
                alert('Este slug já existe!');
                return;
            }

            links.push({ id: Date.now().toString(), name, url, slug, clicks: 0 });
            saveLinks(links);
            
            document.getElementById('linkName').value = '';
            document.getElementById('linkUrl').value = '';
            document.getElementById('linkSlug').value = '';
            
            document.getElementById('result').innerHTML = `✅ Link criado! <br> 🔗 ${window.location.origin}/r/${slug}`;
            setTimeout(() => document.getElementById('result').innerHTML = '', 5000);
            
            renderLinks();
        }

        function openEditModal(id) {
            const links = loadLinks();
            const link = links.find(l => l.id === id);
            if (link) {
                editId = id;
                document.getElementById('editName').value = link.name;
                document.getElementById('editUrl').value = link.url;
                document.getElementById('editModal').style.display = 'flex';
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            editId = null;
        }

        function saveEdit() {
            const newName = document.getElementById('editName').value.trim();
            const newUrl = document.getElementById('editUrl').value.trim();

            if (!newName || !newUrl) {
                alert('Preencha todos os campos!');
                return;
            }

            const links = loadLinks();
            const index = links.findIndex(l => l.id === editId);
            if (index !== -1) {
                links[index].name = newName;
                links[index].url = newUrl;
                saveLinks(links);
                renderLinks();
                closeEditModal();
            }
        }

        function deleteLink(id) {
            if (confirm('Excluir este link?')) {
                const links = loadLinks();
                saveLinks(links.filter(l => l.id !== id));
                renderLinks();
            }
        }

        function renderLinks() {
            const links = loadLinks();
            const container = document.getElementById('linksList');
            const total = links.reduce((s, l) => s + l.clicks, 0);
            document.getElementById('totalClicks').innerHTML = `Total: ${total} clique${total !== 1 ? 's' : ''}`;
            
            if (links.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Nenhum link criado ainda</div>';
                return;
            }
            
            container.innerHTML = links.map(link => `
                <div class="link-item">
                    <div class="link-info">
                        <div class="link-name">${link.name}</div>
                        <div class="link-url">🔗 ${window.location.origin}/r/${link.slug}</div>
                        <div class="link-url">🎯 ${link.url}</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="link-clicks">${link.clicks} cliques</div>
                        <button class="btn-edit" onclick="openEditModal('${link.id}')">✏️ Editar</button>
                        <button class="btn-delete" onclick="deleteLink('${link.id}')">Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        renderLinks();

        // Fechar modal clicando fora
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
